<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Pixtrain – Pixel Weave UI (Full)</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      /* 主色来自 Pixcup 紫（品牌紫底） */
      --bgPurple:#6E63FF;
      --panel:#FFFFFF;
      --ink:#111111;

      --orange:#FF9A1F;
      --magenta:#FF2DAA; /* 玫红辅助 */
      --cyan:#00D7FF;

      --shadow:#000000;
      --muted: rgba(17,17,17,.65);
    }

    body{
      margin:0;
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
      background: var(--bgPurple);
    }

    /* Pixcup-like 紫色斜织纹理（像素斜织/编织感） */
    .weave{
      position: relative;
      overflow: hidden;
    }
    .weave::before{
      content:"";
      position:absolute; inset:0;
      background:
        repeating-linear-gradient(45deg,
          rgba(255,255,255,.22) 0 2px,
          rgba(255,255,255,0) 2px 8px
        ),
        repeating-linear-gradient(-45deg,
          rgba(0,0,0,.10) 0 2px,
          rgba(0,0,0,0) 2px 10px
        );
      opacity:.35;
      mix-blend-mode: overlay;
      pointer-events:none;
    }
    .weave::after{
      content:"";
      position:absolute; inset:0;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,.35), transparent 45%),
        radial-gradient(circle at 85% 30%, rgba(255,45,170,.20), transparent 42%);
      opacity:.45;
      pointer-events:none;
    }

    /* 像素字体：用于标题、步骤、按钮 */
    .px{
      font-family: "Press Start 2P", system-ui;
      letter-spacing:.05em;
      text-transform: uppercase;
    }

    /* 卡片：8px 圆角 + 硬阴影 + 顶部轻高光（卡片仍然更“平整”一点） */
    .pixel-card{
      border-radius: 8px;
      border: 3px solid var(--ink);
      background: var(--panel);
      position: relative;
      box-shadow: 10px 10px 0 var(--shadow);
      overflow:hidden;
    }
    .pixel-card::before{
      content:"";
      position:absolute;
      left:0; top:0; right:0;
      height:10px;
      background: linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,0));
      opacity:.65;
      pointer-events:none;
    }

    /* 轻网格：白卡片的“像素画布” */
    .soft-grid{
      background-image:
        linear-gradient(to right, rgba(0,0,0,.045) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,.045) 1px, transparent 1px);
      background-size: 22px 22px;
    }

    /* 小色块点缀（品牌像素块） */
    .swatch{
      width:14px; height:14px;
      border-radius: 4px;
      border:2px solid var(--ink);
      box-shadow: 3px 3px 0 var(--shadow);
    }

    /* Stat 参数块（像素风计数牌） */
    .stat{
      border-radius: 8px;
      border: 3px solid var(--ink);
      box-shadow: 8px 8px 0 var(--shadow);
      background: white;
      overflow:hidden;
      position: relative;
    }
    .stat::before{
      content:"";
      position:absolute; inset:0;
      background: repeating-linear-gradient(90deg, rgba(0,0,0,.05) 0 2px, transparent 2px 10px);
      opacity:.35;
      pointer-events:none;
    }

    /* ===============================
       Pixel-outline / Pixel-highlight / Pixel-shadow
       (按钮 & 步骤条：参考你给的 Pixcup button)
       =============================== */

    .pixel-btn{
      position: relative;
      border-radius: 10px;     /* 保留一点圆角，但像素味靠硬边层实现 */
      border: 0;
      cursor: pointer;

      /* 像素描边：分层硬边框（无 blur） */
      box-shadow:
        0 0 0 2px #1b1b1b,      /* 内描边 */
        0 0 0 4px #000000,      /* 外描边 */
        0 8px 0 0 #000000;      /* 硬投影 */

      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }

    .pixel-btn:hover{
      filter: saturate(1.05) contrast(1.02);
      transform: translateY(-1px);
    }

    .pixel-btn:active{
      transform: translateY(5px);
      box-shadow:
        0 0 0 2px #1b1b1b,
        0 0 0 4px #000000,
        0 3px 0 0 #000000;
    }
    
    /* 顶部高光条：不再是一整行，两端留出空间 */
    .pixel-btn::before{
      content:"";
      position:absolute;
      top: 4px;
      left: 18px; 
      right: 24px; /* 右侧留空，不对称更自然 */
      height: 4px;
      background: rgba(255, 255, 255, 0.35); /* 柔和的顶部反光 */
      pointer-events:none;
    }

    /* 边角像素块：使用多重渐变精确定位，画出 L 型和右下角亮点 */
    .pixel-btn::after{
      content:"";
      position:absolute;
      inset: 0; /* 铺满按钮以便绝对定位像素点 */
      pointer-events:none;
      background:
        /* 1. 左上角最亮的横向 2x1 像素块 */
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)) 4px 4px / 8px 4px no-repeat,
        /* 2. 左上角最亮的竖向 1x1 像素块，组合成 L 型 */
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)) 4px 8px / 4px 4px no-repeat,
        /* 3. 右下角的点缀反光点 */
        linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)) calc(100% - 6px) calc(100% - 6px) / 4px 4px no-repeat;
    }

    /* ===============================
       步骤指示器 (Step Bar) - 箭头形状与硬描边还原
       =============================== */

    /* 外层容器：负责利用 filter 生成和原本一模一样的像素描边和硬阴影 */
    .step-wrapper {
      position: relative;
      display: flex;
    }

    /* 状态 1：已完成 (深色小阴影) */
    .step-done-wrapper {
      filter: drop-shadow(3px 0 0 rgba(17,17,17,0.8))
              drop-shadow(-3px 0 0 rgba(17,17,17,0.8))
              drop-shadow(0 3px 0 rgba(17,17,17,0.8))
              drop-shadow(0 -3px 0 rgba(17,17,17,0.8))
              drop-shadow(2px 2px 0 rgba(0,0,0,0.5));
    }

    /* 状态 2：当前进行中 (粗黑描边 + 6px 硬阴影) */
    .step-active-wrapper {
      filter: drop-shadow(3px 0 0 var(--ink))
              drop-shadow(-3px 0 0 var(--ink))
              drop-shadow(0 3px 0 var(--ink))
              drop-shadow(0 -3px 0 var(--ink))
              drop-shadow(6px 6px 0 var(--shadow));
      transform: translateY(-2px);
    }

    /* 状态 3：未开始 (Pending) - 改为不透明实色以确保可读性 */
    .step-pending-wrapper {
      /* 将原本的半透明边缘替换为视觉等效的实色（紫灰色 #7A72D6） */
      filter: drop-shadow(2px 0 0 #7A72D6)
              drop-shadow(-2px 0 0 #7A72D6)
              drop-shadow(0 2px 0 #7A72D6)
              drop-shadow(0 -2px 0 #7A72D6);
    }

    .step-pending {
      /* 背景使用不透明的亮紫灰色，文字使用深紫色提升对比度 */
      background: #9289FF;
      color: #352E75; 
    }

    /* 定义三种箭头的裁切路径 (深度为 16px) */
    .step-first {
      clip-path: polygon(0% 0%, calc(100% - 16px) 0%, 100% 50%, calc(100% - 16px) 100%, 0% 100%);
    }
    .step-middle {
      clip-path: polygon(0% 0%, calc(100% - 16px) 0%, 100% 50%, calc(100% - 16px) 100%, 0% 100%, 16px 50%);
    }
    .step-last {
      clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 0% 100%, 16px 50%);
    }

    /* 内部颜色和高光 (完全还原你之前的样式) */
    .step-done {
      background: var(--bgPurple);
      color: rgba(255, 255, 255, 0.7);
    }
    .step-done::before {
      content:""; position:absolute; inset:0; z-index:-1;
      background: repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0 4px, transparent 4px 8px);
    }

    .step-active {
      background: var(--orange);
    }
    .step-active::after { /* 专属 L 型高光保留 */
      content:""; position:absolute; inset:0; pointer-events:none; z-index:10;
      background:
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)) 4px 4px / 8px 4px no-repeat,
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)) 4px 8px / 4px 4px no-repeat;
    }

    .step-pending {
      background: rgba(255, 255, 255, 0.25);
      color: rgba(17, 17, 17, 0.4);
    }

    /* ===============================
       1. 恢复：像素按钮 (Pixel Button) 与颜色类
       =============================== */
    .pixel-btn{
      position: relative;
      border-radius: 10px;
      border: 0;
      cursor: pointer;
      box-shadow:
        0 0 0 2px #1b1b1b,
        0 0 0 4px #000000,
        0 8px 0 0 #000000;
      transition: transform .12s ease, box-shadow .12s ease, filter .12s ease;
    }
    .pixel-btn:hover{
      filter: saturate(1.05) contrast(1.02);
      transform: translateY(-1px);
    }
    .pixel-btn:active{
      transform: translateY(5px);
      box-shadow: 0 0 0 2px #1b1b1b, 0 0 0 4px #000000, 0 3px 0 0 #000000;
    }
    .pixel-btn::before{
      content:""; position:absolute; top:4px; left:14px; right:18px; height:4px;
      background: rgba(255, 255, 255, 0.35); pointer-events:none; z-index:10;
    }
    .pixel-btn::after{
      content:""; position:absolute; inset:0; pointer-events:none; z-index:10;
      background:
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)) 4px 4px / 8px 4px no-repeat,
        linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)) 4px 8px / 4px 4px no-repeat,
        linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)) calc(100% - 6px) calc(100% - 6px) / 4px 4px no-repeat;
    }
    
    /* 核心颜色类 - 千万不要删 */
    .btn-purple{ background: var(--bgPurple); color:#fff; }
    .btn-orange{ background: var(--orange); color:#151515; }
    .btn-magenta{ background: var(--magenta); color:#fff; }
    .btn-black{ background: #111; color:#fff; }
    .btn-red{ background: #FF3B3B; color:#fff; }
    .btn-white{ background: #fff; color:#151515; }
  </style>
</head>

<body> 
  <div class="min-h-screen w-full weave flex flex-col p-8">
    <div class="max-w-6xl w-full h-full mx-auto flex flex-col flex-1">

      <div class="flex items-center justify-between shrink-0 mb-10">
        <div class="px text-[24px] text-white/90">
          Lion Model Assembly Game
        </div>
        <div class="flex gap-3">
          <div class="swatch" style="background: var(--bgPurple)"></div>
          <div class="swatch" style="background: var(--orange)"></div>
          <div class="swatch" style="background: var(--magenta)"></div>
        </div>
      </div>

      <div class="flex gap-2 shrink-0 mb-10"> 
        
        <div class="step-wrapper step-done-wrapper flex-1 flex">
          <div class="step-inner step-first step-done py-5 pl-6 pr-10 w-full"> 
            <div class="px text-[10px] opacity-60 mb-2">DONE</div>
            <div class="px text-[12px]">01 INSTALL</div>
          </div>
        </div>

        <div class="step-wrapper step-active-wrapper flex-1 flex">
          <div class="step-inner step-middle step-active py-5 pl-10 pr-10 w-full">
            <div class="px text-[10px] opacity-80 mb-2 text-black">CURRENT</div>
            <div class="px text-[12px] text-black">02 TEST</div>
          </div>
        </div>

        <div class="step-wrapper step-pending-wrapper flex-1 flex">
          <div class="step-inner step-middle step-pending py-5 pl-10 pr-10 w-full">
            <div class="px text-[10px] mb-2 text-[#352E75]">WAITING</div>
            <div class="px text-[12px] text-[#352E75]">03 MODEL</div>
          </div>
        </div>

        <div class="step-wrapper step-pending-wrapper flex-1 flex">
          <div class="step-inner step-last step-pending py-5 pl-10 pr-6 w-full">
            <div class="px text-[10px] mb-2 text-[#352E75]">WAITING</div>
            <div class="px text-[12px] text-[#352E75]">04 EXECUTE</div>
          </div>
        </div>

      </div>
      
      <div class="grid lg:grid-cols-2 gap-8 flex-1">

        <section class="pixel-card soft-grid p-8 flex flex-col min-h-[480px]">
          <div class="flex items-start justify-between mb-6 shrink-0">
            <div class="px text-[12px]">TCP SETTINGS</div>
            <div class="flex gap-2">
              <div class="swatch" style="background: var(--bgPurple)"></div>
              <div class="swatch" style="background: var(--orange)"></div>
            </div>
          </div>

          <div class="grid grid-cols-3 gap-6 shrink-0">
            <div class="stat p-6 text-center">
              <div class="px text-[11px] mb-4">X</div>
              <div class="px text-[22px] text-black">200</div>
            </div>
            <div class="stat p-6 text-center">
              <div class="px text-[11px] mb-4">Y</div>
              <div class="px text-[22px] text-black">100</div>
            </div>
            <div class="stat p-6 text-center">
              <div class="px text-[11px] mb-4">Z</div>
              <div class="px text-[22px] text-black">200</div>
            </div>
          </div>

          <div class="flex-1"></div>

          <div class="shrink-0 mt-8">
            <button class="pixel-btn btn-magenta w-full py-5 px text-[12px]">
              TEST TOOL
            </button>
            <div class="mt-6 text-sm" style="color: var(--muted);">
              Tip: if motion drifts, try <span class="px text-[10px]" style="color: var(--magenta);">RELATIVE</span> frame.
            </div>
          </div>
        </section>

        <section class="pixel-card soft-grid p-8 flex flex-col min-h-[480px]">
          <div class="flex items-start justify-between mb-6 shrink-0">
            <div class="px text-[12px]">3D ROBOT MODEL</div>
            <div class="swatch" style="background: var(--orange)"></div>
          </div>

          <div class="pixel-card flex-1 min-h-[240px] flex items-center justify-center overflow-hidden"
               style="background: linear-gradient(180deg, rgba(255,154,31,.95), rgba(255,154,31,.80));">
            <div class="px text-[12px] text-black">VOXEL STAGE</div>
          </div>

          <div class="mt-6 grid grid-cols-3 gap-5 shrink-0">
            <button class="pixel-btn btn-orange py-4 px text-[11px]">
              SCAN
            </button>
            <button class="pixel-btn btn-black py-4 px text-[11px]">
              SNAP
            </button>
            <button class="pixel-btn btn-red py-4 px text-[11px]">
              E-STOP
            </button>
          </div>
        </section>

      </div>
    </div>
  </div>
</body>
</html>
